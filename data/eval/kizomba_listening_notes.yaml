# Hand-marked perceived step positions for kizomba eval tracks.
#
# Notation:
#   "M{m}+{n}"  the n-th onset (1-indexed) within measure m, where measure
#               numbering matches the M-labels drawn above the wave in
#               notebooks/06_kizomba_batida_check.ipynb (M1 == first
#               measure after the first detected downbeat).
#   "M{m}"      same as "M{m}+1" (first onset in measure m).
#   "0+{n}"     the n-th onset in the partial pre-M1 region (no M prefix
#               and measure 0 is reserved for that pickup measure).
#
# `stem` is matched by substring against `Path.stem`, so a fragment like
# "Baila_Kizomba" matches "Baila_Kizomba_Amor [XG11YxMWgaI]".
#
# These notes are append-only ground truth — do not retroactively rewrite
# old marks; just add new tracks.
tracks:
  - stem: Baila_Kizomba
    notes:
      - "0+1"
      - "0+3"
      - "0+5"
      - "M1+1"
      - "M1+3"
      - "M1+5"
      - "M1+7"
      - "M1+9"
      - "M2+2"
      - "M2+4"
      - "M2+6"
      - "M2+8"
      - "M3"
      - "M3+3"
      - "M3+5"
      - "M3+7"
      - "M3+10"
      - "M4+2"
      - "M4+4"
      - "M4+6"
      - "M4+8"
      - "M4+10"  # also reads as M5

  - stem: Teu_Toque
    notes:
      - "M4+10"
      - "M5+3"
      - "M5+5"
      - "M5+8"
      - "M5+10"  # also reads as M6
      - "M6+3"
      - "M6+5"
      - "M6+8"
      - "M6+10"  # also reads as M7
      - "M7+3"
      - "M7+5"
      - "M7+8"
      - "M8+1"
      - "M8+4"
      - "M8+6"
      - "M8+9"
      - "M9"
