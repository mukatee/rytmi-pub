      - "M10+10"
      - "M11+5"
      # NOTE: user marked one tap "halfway between M11+9 and M11+10"
      # (sits on a green dashed beat, not a numbered onset). Rounded to
      # M11+9 (closer of the two) — the M{m}+{n} notation can only
      # point at numbered onsets.
      - "M11+9"
      - "M12+1"
      - "M12+5"
      - "M12+7"
      - "M12+10"
      - "M13+4"
      - "M13+7"
      - "M13+10"
      - "M14+2"
